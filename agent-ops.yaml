# AgentOps Configuration — TUI Subscription Mode
# Uses internal APIs from your subscriptions, no per-call API keys needed

workers:
  lead:
    # Claude TUI — architecture, task breakdown
    provider: claude-tui
    model: claude-sonnet-4-20250514
    api_key_env: CLAUDE_SESSION_TOKEN

  design:
    # MiniMax — UI specs + HTML/Tailwind design drafts
    provider: minimax-tui
    model: MiniMax-M3
    api_key_env: MINIMAX_AUTH_TOKEN

  ui:
    # MiniMax — frontend implementation from design drafts
    provider: minimax-tui
    model: MiniMax-M3
    api_key_env: MINIMAX_AUTH_TOKEN

  sde:
    # OpenClaw — backend, APIs, infra
    provider: openclaw
    model: claude-sonnet-4-20250514
    base_url: http://localhost:3100

  review:
    # MiniMax — code + design compliance review
    provider: minimax-tui
    model: MiniMax-M3
    api_key_env: MINIMAX_AUTH_TOKEN

project:
  board: ./board.md
  repo: ./project
  max_iterations: 10