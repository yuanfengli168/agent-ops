# AgentOps Configuration — TUI Subscription Mode
# Uses internal APIs from your subscriptions, no per-call API keys needed

workers:
  lead:
    # Claude TUI — uses your Claude Pro subscription
    provider: claude-tui
    model: claude-sonnet-4-20250514
    api_key_env: CLAUDE_SESSION_TOKEN

  design:
    # Design worker — generates UI specs, mockups, 3D renders
    provider: design
    model: gpt-4o
    api_key_env: OPENAI_API_KEY

  ui:
    # OpenClaw — local gateway, already running
    provider: openclaw
    model: claude-sonnet-4-20250514
    base_url: http://localhost:3100

  sde:
    # OpenClaw — local gateway, already running
    provider: openclaw
    model: claude-sonnet-4-20250514
    base_url: http://localhost:3100

  review:
    # MiniMax TUI — checks code quality AND design compliance
    provider: minimax-tui
    model: MiniMax-M1
    api_key_env: MINIMAX_AUTH_TOKEN

project:
  board: ./board.md
  repo: ./project
  max_iterations: 10