# AgentOps Configuration — TUI Subscription Mode
# Uses internal APIs from your subscriptions, no per-call API keys needed

workers:
  lead:
    # Claude TUI — uses your Claude Pro subscription
    provider: claude-tui
    model: claude-sonnet-4-20250514
    api_key_env: CLAUDE_SESSION_TOKEN  # Extract from browser DevTools

  ui:
    # OpenClaw — local gateway, already running
    provider: openclaw
    model: claude-sonnet-4-20250514
    base_url: http://localhost:3100

  sde:
    # OpenClaw — local gateway, already running
    provider: openclaw
    model: claude-sonnet-4-20250514
    base_url: http://localhost:3100

  review:
    # MiniMax TUI — uses your MiniMax subscription
    provider: minimax-tui
    model: MiniMax-M1
    api_key_env: MINIMAX_AUTH_TOKEN  # Extract from browser DevTools

project:
  board: ./board.md
  repo: ./project
  max_iterations: 10

# Environment variables to set:
# CLAUDE_SESSION_TOKEN — From Claude app cookies (DevTools > Application > Cookies > sessionKey)
# CLAUDE_ORG_ID — From Claude app (optional, found in URL or API calls)
# MINIMAX_AUTH_TOKEN — From MiniMax/Hailuo web app cookies/auth header